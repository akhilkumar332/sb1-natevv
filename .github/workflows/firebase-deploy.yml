name: Firebase Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
      VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BLOODHUBINDIA_1DA2A }}

      - name: Setup Firebase CLI
        run: npm install -g firebase-tools

      - name: Install dependencies
        run: npm ci

      - name: Prepare Firebase Functions env
        run: |
          mkdir -p src/functions
          cat > src/functions/.env <<EOF
          CONTACT_RATE_LIMIT_MAX_PER_MINUTE=${{ secrets.CONTACT_RATE_LIMIT_MAX_PER_MINUTE }}
          FRONTEND_GATE_MAX_ATTEMPTS_PER_MINUTE=${{ secrets.FRONTEND_GATE_MAX_ATTEMPTS_PER_MINUTE }}
          SITE_URL=${{ secrets.SITE_URL }}
          CORS_ALLOWED_ORIGINS=${{ secrets.CORS_ALLOWED_ORIGINS }}
          WEBAUTHN_RP_ID=${{ secrets.WEBAUTHN_RP_ID }}
          WEBAUTHN_ALLOWED_ORIGINS=${{ secrets.WEBAUTHN_ALLOWED_ORIGINS }}
          FCM_BRIDGE_SIGNING_SECRET=${{ secrets.FCM_BRIDGE_SIGNING_SECRET }}
          FRONTEND_GATE_PASSWORD=${{ secrets.FRONTEND_GATE_PASSWORD }}
          FRONTEND_GATE_SESSION_SECRET=${{ secrets.FRONTEND_GATE_SESSION_SECRET }}
          EOF

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Deploy Hosting and Functions
        run: firebase deploy --only hosting,functions --project bloodhubindia-1da2a
