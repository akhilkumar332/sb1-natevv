name: Firebase Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_hosting:
        description: Deploy Hosting
        required: true
        default: 'true'
        type: choice
        options: ['true', 'false']
      deploy_functions:
        description: Deploy Firebase Functions
        required: true
        default: 'true'
        type: choice
        options: ['true', 'false']
      deploy_rules:
        description: Deploy Firestore/Storage rules and Firestore indexes
        required: true
        default: 'false'
        type: choice
        options: ['true', 'false']

concurrency:
  group: firebase-prod-deploy
  cancel-in-progress: false

jobs:
  determine-scope:
    runs-on: ubuntu-latest
    outputs:
      deploy_hosting: ${{ steps.scope.outputs.deploy_hosting }}
      deploy_functions: ${{ steps.scope.outputs.deploy_functions }}
      deploy_rules: ${{ steps.scope.outputs.deploy_rules }}
      any_deploy: ${{ steps.scope.outputs.any_deploy }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine deploy scope
        id: scope
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            DEPLOY_HOSTING="${{ inputs.deploy_hosting }}"
            DEPLOY_FUNCTIONS="${{ inputs.deploy_functions }}"
            DEPLOY_RULES="${{ inputs.deploy_rules }}"
          else
            BEFORE_SHA="${{ github.event.before }}"
            CURRENT_SHA="${{ github.sha }}"
            if [[ -z "$BEFORE_SHA" || "$BEFORE_SHA" == "0000000000000000000000000000000000000000" ]]; then
              CHANGED_FILES="$(git ls-files)"
            else
              CHANGED_FILES="$(git diff --name-only "$BEFORE_SHA" "$CURRENT_SHA")"
            fi

            DEPLOY_HOSTING=false
            DEPLOY_FUNCTIONS=false
            DEPLOY_RULES=false

            while IFS= read -r FILE; do
              [[ -z "$FILE" ]] && continue
              case "$FILE" in
                src/functions/*)
                  DEPLOY_FUNCTIONS=true
                  ;;
                firestore.rules|storage.rules|firestore.indexes.json)
                  DEPLOY_RULES=true
                  ;;
                src/*|public/*|index.html|package.json|package-lock.json|vite.config.ts|tsconfig*.json|tailwind.config.*|postcss.config.*|firebase.json|scripts/build.mjs|scripts/prepare-firebase-config.mjs|scripts/generate-offline-write-inventory.mjs|scripts/generate-seo-artifacts.mjs)
                  DEPLOY_HOSTING=true
                  ;;
                *)
                  ;;
              esac
            done <<< "$CHANGED_FILES"
          fi

          ANY_DEPLOY=false
          if [[ "$DEPLOY_HOSTING" == "true" || "$DEPLOY_FUNCTIONS" == "true" || "$DEPLOY_RULES" == "true" ]]; then
            ANY_DEPLOY=true
          fi

          echo "deploy_hosting=$DEPLOY_HOSTING" >> "$GITHUB_OUTPUT"
          echo "deploy_functions=$DEPLOY_FUNCTIONS" >> "$GITHUB_OUTPUT"
          echo "deploy_rules=$DEPLOY_RULES" >> "$GITHUB_OUTPUT"
          echo "any_deploy=$ANY_DEPLOY" >> "$GITHUB_OUTPUT"

  validate:
    runs-on: ubuntu-latest
    needs: determine-scope
    if: needs.determine-scope.outputs.any_deploy == 'true'
    permissions:
      contents: read

    env:
      VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
      VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
      VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
      VITE_ENABLE_ANALYTICS: ${{ secrets.VITE_ENABLE_ANALYTICS }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            src/functions/package-lock.json
            scripts/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:run

      - name: Build
        env:
          APP_ENVIRONMENT: prod
          APP_DEPLOY_TARGET: firebase-hosting
        run: npm run build

  deploy-hosting:
    runs-on: ubuntu-latest
    needs: [determine-scope, validate]
    if: needs.determine-scope.outputs.deploy_hosting == 'true'
    environment: prod
    permissions:
      contents: read

    env:
      VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
      VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
      VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
      VITE_ENABLE_ANALYTICS: ${{ secrets.VITE_ENABLE_ANALYTICS }}
      FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BLOODHUBINDIA_1DA2A }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            src/functions/package-lock.json
            scripts/package-lock.json

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ env.FIREBASE_SERVICE_ACCOUNT_JSON }}

      - name: Setup Firebase CLI
        run: npm install -g firebase-tools

      - name: Install dependencies
        run: npm ci

      - name: Build production assets
        env:
          APP_ENVIRONMENT: prod
          APP_DEPLOY_TARGET: firebase-hosting
        run: npm run build

      - name: Deploy Hosting
        run: firebase deploy --only hosting --project bloodhubindia-1da2a

      - name: Record deployment ledger
        continue-on-error: true
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
        run: node scripts/record-deployment.mjs

  deploy-functions:
    runs-on: ubuntu-latest
    needs: [determine-scope, validate]
    if: needs.determine-scope.outputs.deploy_functions == 'true'
    environment: prod
    permissions:
      contents: read

    env:
      FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BLOODHUBINDIA_1DA2A }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            src/functions/package-lock.json
            scripts/package-lock.json

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ env.FIREBASE_SERVICE_ACCOUNT_JSON }}

      - name: Setup Firebase CLI
        run: npm install -g firebase-tools

      - name: Install dependencies
        run: npm ci

      - name: Prepare Firebase Functions env
        run: |
          mkdir -p src/functions
          cat > src/functions/.env <<EOF
          CONTACT_RATE_LIMIT_MAX_PER_MINUTE=${{ secrets.CONTACT_RATE_LIMIT_MAX_PER_MINUTE }}
          FRONTEND_GATE_MAX_ATTEMPTS_PER_MINUTE=${{ secrets.FRONTEND_GATE_MAX_ATTEMPTS_PER_MINUTE }}
          SITE_URL=${{ secrets.SITE_URL }}
          CORS_ALLOWED_ORIGINS=${{ secrets.CORS_ALLOWED_ORIGINS }}
          WEBAUTHN_RP_ID=${{ secrets.WEBAUTHN_RP_ID }}
          WEBAUTHN_ALLOWED_ORIGINS=${{ secrets.WEBAUTHN_ALLOWED_ORIGINS }}
          FCM_BRIDGE_SIGNING_SECRET=${{ secrets.FCM_BRIDGE_SIGNING_SECRET }}
          FRONTEND_GATE_PASSWORD=${{ secrets.FRONTEND_GATE_PASSWORD }}
          FRONTEND_GATE_SESSION_SECRET=${{ secrets.FRONTEND_GATE_SESSION_SECRET }}
          EOF

      - name: Deploy Functions
        run: firebase deploy --only functions --project bloodhubindia-1da2a

  deploy-rules:
    runs-on: ubuntu-latest
    needs: [determine-scope, validate]
    if: needs.determine-scope.outputs.deploy_rules == 'true'
    environment: prod
    permissions:
      contents: read

    env:
      FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BLOODHUBINDIA_1DA2A }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ env.FIREBASE_SERVICE_ACCOUNT_JSON }}

      - name: Setup Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Firestore and Storage rules plus indexes
        run: firebase deploy --only firestore:rules,firestore:indexes,storage --project bloodhubindia-1da2a
